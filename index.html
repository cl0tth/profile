<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>gifted??</title>
		<style>
			:root {
				--bg: #000;
				--fg: #fff;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				cursor: none; 
			}

			body {
				background: var(--bg);
				color: var(--fg);
				font-family: "Inter", -apple-system, monospace, sans-serif;
				height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				user-select: none;
			}

			body::after {
				content: '';
				position: fixed;
				top: 0; left: 0; width: 100%; height: 100%;
				background: repeating-linear-gradient(
					0deg,
					rgba(255, 255, 255, 0.05),
					rgba(255, 255, 255, 0.05) 1px,
					transparent 1px,
					transparent 3px
				);
				pointer-events: none;
				z-index: 998;
				opacity: 0;
				transition: opacity 0.2s ease;
			}

			body.is-pressed::after {
				opacity: 1;
			}

			#cursor {
				position: fixed;
				width: 20px;
				height: 20px;
				background: var(--fg);
				border-radius: 50%;
				pointer-events: none;
				z-index: 999;
				mix-blend-mode: difference;
				transition: transform 0.15s ease-out, border-radius 0.3s ease, background 0.2s ease;
			}

			#cursor.hacker-mode {
				border-radius: 2px;
				transform: scale(2.5) !important;
			}

			body.is-pressed #cursor {
				transform: scale(0.3) !important;
				background: #ff003c;
				border-radius: 0;
				mix-blend-mode: normal;
				box-shadow: 0 0 15px 5px rgba(255, 0, 60, 0.4);
			}

			.container {
				width: 100%;
				max-width: 800px;
				padding: 2rem;
				position: relative;
				z-index: 2;
				transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			}

			body.is-pressed .container {
				transform: scale(0.96);
			}

			.title-wrapper {
				display: inline-block;
			}

			.main-title {
				font-size: clamp(3rem, 10vw, 6rem);
				font-weight: 900;
				letter-spacing: -0.05em;
				line-height: 0.9;
				margin-bottom: 2rem;
				position: relative;
				display: inline-block;
				transition: text-shadow 0.3s ease;
			}

			.main-title:hover {
				text-shadow: 
					3px 0px 0px rgba(255, 0, 0, 0.7),
					-3px 0px 0px rgba(0, 255, 255, 0.7);
			}

			body.is-pressed .main-title {
				animation: glitch-shake 0.2s infinite;
				text-shadow: 
					5px 0px 0px rgba(255, 0, 0, 0.9),
					-5px 0px 0px rgba(0, 255, 255, 0.9);
			}

			.q-mark {
				display: inline-block;
				transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease, text-shadow 0.3s ease;
			}

			.main-title:hover .q-mark:nth-child(1) {
				transform: translateY(-12px) rotate(15deg);
				color: #ff003c;
				text-shadow: 0 0 10px #ff003c;
			}
			
			.main-title:hover .q-mark:nth-child(2) {
				transform: translateY(-8px) rotate(-10deg);
				color: #00f0ff;
				text-shadow: 0 0 10px #00f0ff;
				transition-delay: 0.05s;
			}

			.grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 4rem;
				border-top: 1px solid #222;
				padding-top: 2rem;
			}

			.grid-item {
				position: relative;
				transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.grid-item::before {
				content: '';
				position: absolute;
				left: -1.5rem; 
				top: 0;
				height: 100%;
				width: 2px;
				background: var(--fg);
				transform: scaleY(0);
				transform-origin: top;
				transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.grid-item:hover {
				transform: translateX(1.5rem);
			}

			.grid-item:hover::before {
				transform: scaleY(1);
			}

			.section-label {
				font-size: 0.7rem;
				text-transform: uppercase;
				letter-spacing: 0.3em;
				color: #555;
				margin-bottom: 1rem;
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.section-label::after {
				content: '';
				display: inline-block;
				width: 6px;
				height: 12px;
				background: #555;
				opacity: 0;
			}

			.grid-item:hover .section-label::after {
				animation: blink 1s step-end infinite;
				background: var(--fg);
			}

			.content-text {
				font-size: 1.1rem;
				font-weight: 300;
				line-height: 1.6;
				color: #888;
				transition: color 0.4s ease;
			}

			.grid-item:hover .content-text {
				color: var(--fg);
			}

			.links {
				margin-top: 4rem;
			}

			.link-item {
				display: inline-block;
				font-size: 1.5rem;
				text-decoration: none;
				color: var(--fg);
				position: relative;
				padding-bottom: 5px;
				font-family: monospace;
			}

			.link-item::after {
				content: '';
				position: absolute;
				bottom: 0;
				left: 0;
				width: 0;
				height: 2px;
				background: var(--fg);
				transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.link-item:hover::after {
				width: 100%;
			}

			@keyframes blink {
				0%, 100% { opacity: 1; }
				50% { opacity: 0; }
			}

			@keyframes glitch-shake {
				0% { transform: translate(2px, 1px); }
				20% { transform: translate(-2px, -2px); }
				40% { transform: translate(1px, -1px); }
				60% { transform: translate(-2px, 2px); }
				80% { transform: translate(2px, -2px); }
				100% { transform: translate(1px, 2px); }
			}

			@media (max-width: 600px) {
				.grid {
					grid-template-columns: 1fr;
					gap: 2rem;
				}
			}
		</style>
	</head>
	<body>
		<div id="cursor"></div>

		<div class="container">
			<header class="title-wrapper">
				<h1 class="main-title">
					gifted<span class="q-mark">?</span><span class="q-mark">?</span>
				</h1>
			</header>

			<main class="grid">
				<div class="grid-item">
					<p class="section-label">Identity</p>
					<p class="content-text">Backend Development & Cybersecurity. Driven by logic, obsessed with the "why".</p>
				</div>
				<div class="grid-item">
					<p class="section-label">Philosophy</p>
					<p class="content-text">System is a cage. Code is the key. Questions are the only way out.</p>
				</div>
			</main>

			<footer class="links">
				<a href="https://t.me/g1ftted" class="link-item" data-value="contact_me">contact_me</a>
			</footer>
		</div>

		<script>
			const cursor = document.getElementById('cursor');
			
			document.addEventListener('mousedown', () => document.body.classList.add('is-pressed'));
			document.addEventListener('mouseup', () => document.body.classList.remove('is-pressed'));
			document.addEventListener('mouseleave', () => document.body.classList.remove('is-pressed'));

			document.addEventListener('mousemove', (e) => {
				cursor.style.left = e.clientX + 'px';
				cursor.style.top = e.clientY + 'px';
			});

			const targets = document.querySelectorAll('a, .main-title, .grid-item');
			targets.forEach(target => {
				target.addEventListener('mouseenter', () => {
					if (target.classList.contains('grid-item') || target.classList.contains('link-item')) {
						cursor.classList.add('hacker-mode');
					} else {
						cursor.style.transform = 'scale(4)';
					}
				});
				target.addEventListener('mouseleave', () => {
					cursor.classList.remove('hacker-mode');
					cursor.style.transform = 'scale(1)';
				});
			});

			const titleWrapper = document.querySelector('.title-wrapper');
			document.addEventListener('mousemove', (e) => {
				const x = (window.innerWidth / 2 - e.clientX) / 60;
				const y = (window.innerHeight / 2 - e.clientY) / 60;
				titleWrapper.style.transform = `translate(${x}px, ${y}px)`;
			});

			const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
			const linkItem = document.querySelector('.link-item');
			
			linkItem.onmouseover = event => {  
				let iterations = 0;
				const target = event.target;
				const originalText = target.dataset.value;
				
				clearInterval(target.interval);
				
				target.interval = setInterval(() => {
					target.innerText = originalText
						.split("")
						.map((letter, index) => {
							if(index < iterations) {
								return originalText[index];
							}
							return letters[Math.floor(Math.random() * letters.length)];
						})
						.join("");
					
					if(iterations >= originalText.length){ 
						clearInterval(target.interval);
					}
					
					iterations += 1 / 3; 
				}, 30);
			}
		</script>
	</body>
</html>
