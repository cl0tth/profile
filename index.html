<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>gifted??</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent-red: #ff003c;
            --accent-cyan: #00f0ff;
            --glow-red: rgba(255, 0, 60, 0.6);
            --glow-cyan: rgba(0, 240, 255, 0.6);
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            user-select: none;
            touch-action: pan-x pan-y;
            padding: 1.5rem;
        }

        @media (pointer: fine) {
            * { cursor: none; }
            #cursor { display: block; }
        }

        @media (pointer: coarse) {
            #cursor { display: none !important; }
            body { cursor: auto; }
            .grid-item, .link-item, .main-title {
                cursor: pointer;
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.1);
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.04) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 998;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        body.is-pressed::after { opacity: 1; }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--fg);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease-out, border-radius 0.3s ease, background 0.2s ease;
            will-change: left, top;
        }

        #cursor.hacker-mode {
            border-radius: 2px;
            transform: scale(2.5) !important;
        }

        body.is-pressed #cursor {
            transform: scale(0.3) !important;
            background: var(--accent-red);
            border-radius: 0;
            mix-blend-mode: normal;
            box-shadow: 0 0 15px 5px var(--glow-red);
        }

        .container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding: 1rem 0.5rem;
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.is-pressed .container { transform: scale(0.98); }

        .title-wrapper {
            display: inline-block;
            margin-bottom: 1rem;
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        .main-title {
            font-size: clamp(3.2rem, 12vw, 6rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            transition: text-shadow 0.2s ease;
        }

        .main-title:hover { text-shadow: 3px 0px 0px var(--glow-red), -3px 0px 0px var(--glow-cyan); }

        body.is-pressed .main-title {
            animation: glitch-shake 0.2s infinite;
            text-shadow: 5px 0px 0px var(--accent-red), -5px 0px 0px var(--accent-cyan);
        }

        .q-mark {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            border-top: 1px solid #222;
            padding-top: 2rem;
            margin-top: 0.5rem;
        }

        .grid-item {
            position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 0.25rem 0;
        }

        .grid-item::before {
            content: '';
            position: absolute;
            left: -1.2rem;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--fg);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .grid-item:hover, .grid-item:active {
            transform: translateX(1.5rem);
        }

        .grid-item:hover::before, .grid-item:active::before {
            transform: scaleY(1);
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #555;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-text {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #888;
            transition: color 0.4s ease;
        }

        .grid-item:hover .content-text, .grid-item:active .content-text { color: var(--fg); }

        #visit-counter {
            font-family: monospace;
            color: var(--accent-cyan);
            text-shadow: 0 0 8px var(--glow-cyan);
            font-weight: bold;
        }

        .links { margin-top: 4rem; }

        .link-item {
            display: inline-block;
            font-size: 1.5rem;
            text-decoration: none;
            color: var(--fg);
            position: relative;
            padding-bottom: 5px;
            font-family: monospace;
        }

        .link-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 2px;
            background: var(--fg);
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .link-item:hover::after, .link-item:active::after { width: 100%; }

        @keyframes glitch-shake {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-2px, -2px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(1px, 2px); }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <div class="container">
        <header class="title-wrapper">
            <h1 class="main-title">
                gifted<span class="q-mark">?</span><span class="q-mark">?</span>
            </h1>
        </header>

        <main class="grid">
            <div class="grid-item">
                <p class="section-label">Identity</p>
                <p class="content-text">Backend Development & Cybersecurity. Driven by logic, obsessed with the "why".</p>
            </div>
            <div class="grid-item">
                <p class="section-label">Philosophy</p>
                <p class="content-text">System is a cage. Code is the key. Questions are the only way out.</p>
            </div>
            <div class="grid-item">
                <p class="section-label">Global Access</p>
                <p class="content-text">Entries detected: <span id="visit-counter">CONNECTING...</span></p>
            </div>
        </main>

        <footer class="links">
            <a href="https://t.me/g1ftted" class="link-item" data-value="contact_me">contact_me</a>
        </footer>
    </div>

    <script>
        (function() {
            const isTouch = window.matchMedia("(pointer: coarse)").matches;
            const cursor = document.getElementById('cursor');
            
            if (!isTouch) {
                document.addEventListener('mousedown', () => document.body.classList.add('is-pressed'));
                document.addEventListener('mouseup', () => document.body.classList.remove('is-pressed'));
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });

                const targets = document.querySelectorAll('a, .main-title, .grid-item');
                targets.forEach(target => {
                    target.addEventListener('mouseenter', () => {
                        if (target.classList.contains('grid-item') || target.classList.contains('link-item')) {
                            cursor.classList.add('hacker-mode');
                        } else {
                            cursor.style.transform = 'scale(4)';
                        }
                    });
                    target.addEventListener('mouseleave', () => {
                        cursor.classList.remove('hacker-mode');
                        cursor.style.transform = 'scale(1)';
                    });
                });
            }

            const titleWrapper = document.querySelector('.title-wrapper');
            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', (e) => {
                const clientX = isTouch ? e.touches[0].clientX : e.clientX;
                const clientY = isTouch ? e.touches[0].clientY : e.clientY;
                const x = (window.innerWidth / 2 - clientX) / 60;
                const y = (window.innerHeight / 2 - clientY) / 60;
                titleWrapper.style.transform = `translate(${x}px, ${y}px)`;
            });

            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            const runHackerEffect = (target) => {
                let iterations = 0;
                const originalText = target.dataset.value;
                clearInterval(target.interval);
                target.interval = setInterval(() => {
                    target.innerText = originalText.split("").map((letter, index) => {
                        if(index < iterations) return originalText[index];
                        return letters[Math.floor(Math.random() * letters.length)];
                    }).join("");
                    if(iterations >= originalText.length) clearInterval(target.interval);
                    iterations += 1 / 3;
                }, 30);
            };

            const linkItem = document.querySelector('.link-item');
            if (linkItem) {
                linkItem.addEventListener(isTouch ? 'touchstart' : 'mouseenter', (e) => runHackerEffect(e.currentTarget));
            }

            async function initCounter() {
                const counterEl = document.getElementById('visit-counter');
                
                // Твои настройки
                const apiKey = "ut_SPzYU9ewT690411Zke4T38mNAv2lwVFL8xExKXHM";
                const workspace = "cl0tth"; 
                const counterName = "main_site_visits";
                const url = `https://api.counterapi.dev/v2/${workspace}/${counterName}/up`;
            
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'X-API-Key': apiKey 
                        }
                    });
            
                    if (!response.ok) {
                        throw new Error(`API Status: ${response.status}`);
                    }
            
                    const data = await response.json();
                    counterEl.innerText = data.value.toString().padStart(6, '0');
                } catch (e) {
                    console.error("Counter Auth Error:", e);
                    counterEl.innerText = "AUTH_ERR";
                }
            }
            initCounter();
        })();
    </script>
</body>
</html>
