<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>gifted??</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent-red: #ff003c;
            --accent-cyan: #00f0ff;
            --glow-red: rgba(255, 0, 60, 0.6);
            --glow-cyan: rgba(0, 240, 255, 0.6);
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            user-select: none;
            touch-action: pan-x pan-y;
            padding: 1.5rem;
        }

        @media (pointer: fine) {
            * {
                cursor: none;
            }
            #cursor {
                display: block;
            }
        }

        @media (pointer: coarse) {
            #cursor {
                display: none !important;
            }
            body {
                cursor: auto;
            }
            .grid-item, .link-item, .main-title, .counter-item {
                cursor: pointer;
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.1);
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.04) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 998;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        body.is-pressed::after {
            opacity: 1;
        }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--fg);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease-out, border-radius 0.3s ease, background 0.2s ease;
            will-change: left, top;
        }

        #cursor.hacker-mode {
            border-radius: 2px;
            transform: scale(2.5) !important;
        }

        body.is-pressed #cursor {
            transform: scale(0.3) !important;
            background: var(--accent-red);
            border-radius: 0;
            mix-blend-mode: normal;
            box-shadow: 0 0 15px 5px var(--glow-red);
        }

        .container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding: 1rem 0.5rem;
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.is-pressed .container {
            transform: scale(0.98);
        }

        .title-wrapper {
            display: inline-block;
            margin-bottom: 1rem;
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        .main-title {
            font-size: clamp(3.2rem, 12vw, 6rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            transition: text-shadow 0.2s ease;
            word-break: keep-all;
        }

        @media (pointer: coarse) {
            .main-title:active {
                text-shadow: 3px 0px 0px var(--accent-red), -3px 0px 0px var(--accent-cyan);
                animation: glitch-shake 0.15s infinite;
            }
        }

        .main-title:hover {
            text-shadow: 3px 0px 0px var(--glow-red), -3px 0px 0px var(--glow-cyan);
        }

        body.is-pressed .main-title {
            animation: glitch-shake 0.2s infinite;
            text-shadow: 5px 0px 0px var(--accent-red), -5px 0px 0px var(--accent-cyan);
        }

        .q-mark {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s ease, text-shadow 0.2s ease;
        }

        @media (pointer: fine) {
            .main-title:hover .q-mark:nth-child(1) {
                transform: translateY(-12px) rotate(15deg);
                color: var(--accent-red);
                text-shadow: 0 0 10px var(--accent-red);
            }
            .main-title:hover .q-mark:nth-child(2) {
                transform: translateY(-8px) rotate(-10deg);
                color: var(--accent-cyan);
                text-shadow: 0 0 10px var(--accent-cyan);
                transition-delay: 0.05s;
            }
        }

        @media (pointer: coarse) {
            .q-mark:active {
                transform: translateY(-6px) scale(1.1);
                color: var(--accent-red);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            border-top: 1px solid #222;
            padding-top: 2rem;
            margin-top: 0.5rem;
        }

        .grid-item, .counter-item {
            position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 0.25rem 0;
        }

        .grid-item::before, .counter-item::before {
            content: '';
            position: absolute;
            left: -1.2rem;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--fg);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @media (pointer: coarse) {
            .grid-item:active, .counter-item:active {
                transform: translateX(1rem);
            }
            .grid-item:active::before, .counter-item:active::before {
                transform: scaleY(1);
            }
            .grid-item:active .content-text, .counter-item:active .counter-value {
                color: var(--fg);
            }
            .grid-item:active .section-label::after, .counter-item:active .section-label::after {
                animation: blink 1s step-end infinite;
                background: var(--fg);
            }
        }

        @media (pointer: fine) {
            .grid-item:hover, .counter-item:hover {
                transform: translateX(1.5rem);
            }
            .grid-item:hover::before, .counter-item:hover::before {
                transform: scaleY(1);
            }
            .grid-item:hover .content-text, .counter-item:hover .counter-value {
                color: var(--fg);
            }
            .grid-item:hover .section-label::after, .counter-item:hover .section-label::after {
                animation: blink 1s step-end infinite;
                background: var(--fg);
            }
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #555;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #555;
            opacity: 0;
        }

        .content-text {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #888;
            transition: color 0.4s ease;
        }

        .counter-value {
            font-size: 1.1rem;
            font-weight: 300;
            font-family: monospace;
            letter-spacing: 2px;
            color: #888;
            transition: color 0.4s ease, text-shadow 0.2s ease;
        }

        .counter-digit {
            display: inline-block;
            min-width: 0.8em;
            text-align: center;
        }

        .links {
            margin-top: 4rem;
        }

        .link-item {
            display: inline-block;
            font-size: 1.5rem;
            text-decoration: none;
            color: var(--fg);
            position: relative;
            padding-bottom: 5px;
            font-family: monospace;
        }

        .link-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--fg);
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @media (pointer: fine) {
            .link-item:hover::after {
                width: 100%;
            }
        }

        @media (pointer: coarse) {
            .link-item:active::after {
                width: 100%;
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes glitch-shake {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-2px, -2px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(1px, 2px); }
        }

        @keyframes digitGlitch {
            0% { text-shadow: -2px 0 var(--accent-red), 2px 0 var(--accent-cyan); opacity: 0.8; }
            50% { text-shadow: 2px 0 var(--accent-red), -2px 0 var(--accent-cyan); opacity: 1; }
            100% { text-shadow: 0 0 var(--accent-red), 0 0 var(--accent-cyan); opacity: 1; }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .container {
                padding: 0.5rem;
            }
            .links {
                margin-top: 3rem;
            }
            .link-item {
                font-size: 1.3rem;
            }
            .section-label {
                font-size: 0.65rem;
            }
            .content-text, .counter-value {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .grid-item::before, .counter-item::before {
                left: -0.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <div class="container">
        <header class="title-wrapper">
            <h1 class="main-title">
                gifted<span class="q-mark">?</span><span class="q-mark">?</span>
            </h1>
        </header>

        <main class="grid">
            <div class="grid-item">
                <p class="section-label">Identity</p>
                <p class="content-text">Backend Development & Cybersecurity. Driven by logic, obsessed with the "why".</p>
            </div>
            <div class="grid-item">
                <p class="section-label">Philosophy</p>
                <p class="content-text">System is a cage. Code is the key. Questions are the only way out.</p>
            </div>
            <div class="counter-item">
                <p class="section-label">Visitors</p>
                <p class="counter-value" id="counterDisplay">0000</p>
            </div>
        </main>

        <footer class="links">
            <a href="https://t.me/g1ftted" class="link-item" data-value="contact_me">contact_me</a>
        </footer>
    </div>

    <script>
        (function() {
            const isTouch = window.matchMedia("(pointer: coarse)").matches;
            const cursor = document.getElementById('cursor');
            
            if (!isTouch) {
                document.addEventListener('mousedown', () => document.body.classList.add('is-pressed'));
                document.addEventListener('mouseup', () => document.body.classList.remove('is-pressed'));
                document.addEventListener('mouseleave', () => document.body.classList.remove('is-pressed'));

                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });

                const targets = document.querySelectorAll('a, .main-title, .grid-item, .counter-item');
                targets.forEach(target => {
                    target.addEventListener('mouseenter', () => {
                        if (target.classList.contains('grid-item') || target.classList.contains('counter-item') || target.classList.contains('link-item')) {
                            cursor.classList.add('hacker-mode');
                        } else {
                            cursor.style.transform = 'scale(4)';
                        }
                    });
                    target.addEventListener('mouseleave', () => {
                        cursor.classList.remove('hacker-mode');
                        cursor.style.transform = 'scale(1)';
                    });
                });
            } else {
                document.body.addEventListener('touchstart', (e) => {
                    document.body.classList.add('is-pressed');
                    setTimeout(() => {
                        document.body.classList.remove('is-pressed');
                    }, 120);
                });
                document.body.addEventListener('touchend', () => {
                    document.body.classList.remove('is-pressed');
                });
            }

            const titleWrapper = document.querySelector('.title-wrapper');
            if (!isTouch) {
                document.addEventListener('mousemove', (e) => {
                    const x = (window.innerWidth / 2 - e.clientX) / 60;
                    const y = (window.innerHeight / 2 - e.clientY) / 60;
                    titleWrapper.style.transform = `translate(${x}px, ${y}px)`;
                });
            } else {
                let touchX = 0, touchY = 0;
                document.body.addEventListener('touchmove', (e) => {
                    if (e.touches.length) {
                        touchX = (window.innerWidth / 2 - e.touches[0].clientX) / 60;
                        touchY = (window.innerHeight / 2 - e.touches[0].clientY) / 60;
                        titleWrapper.style.transform = `translate(${touchX}px, ${touchY}px)`;
                    }
                });
                document.body.addEventListener('touchend', () => {
                    titleWrapper.style.transform = `translate(0px, 0px)`;
                });
            }

            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            const linkItem = document.querySelector('.link-item');
            
            const runHackerEffect = (target) => {
                let iterations = 0;
                const originalText = target.dataset.value;
                if (!originalText) return;
                
                clearInterval(target.interval);
                
                target.interval = setInterval(() => {
                    target.innerText = originalText
                        .split("")
                        .map((letter, index) => {
                            if(index < iterations) {
                                return originalText[index];
                            }
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");
                    
                    if(iterations >= originalText.length){ 
                        clearInterval(target.interval);
                        target.innerText = originalText;
                    }
                    
                    iterations += 1 / 3;
                }, 30);
            };
            
            if (linkItem) {
                if (!isTouch) {
                    linkItem.addEventListener('mouseenter', (e) => {
                        runHackerEffect(e.currentTarget);
                    });
                } else {
                    linkItem.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        runHackerEffect(e.currentTarget);
                        setTimeout(() => {
                            window.location.href = linkItem.getAttribute('href');
                        }, 200);
                    });
                }
            }

            const gridItems = document.querySelectorAll('.grid-item');
            if (isTouch) {
                gridItems.forEach(item => {
                    item.addEventListener('touchstart', (e) => {
                        item.classList.add('touch-active');
                    });
                    item.addEventListener('touchend', () => {
                        setTimeout(() => {
                            item.classList.remove('touch-active');
                        }, 150);
                    });
                });
            }

            const COUNTER_KEY = 'gifted_visits';
            const counterDisplay = document.getElementById('counterDisplay');
            
            const formatCount = (num) => {
                return num.toString().padStart(4, '0').slice(0, 6);
            };
            
            const animateCounterWithGlitch = (element, start, end, duration = 700) => {
                const startTime = performance.now();
                const updateCounter = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                    const currentValue = Math.floor(start + (end - start) * easeOutCubic);
                    element.textContent = formatCount(currentValue);
                    
                    if (progress < 0.3) {
                        element.style.animation = 'digitGlitch 0.08s infinite';
                    } else if (progress < 0.7) {
                        element.style.animation = 'digitGlitch 0.05s infinite';
                    } else {
                        element.style.animation = '';
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(updateCounter);
                    } else {
                        element.textContent = formatCount(end);
                        element.style.animation = '';
                        element.style.color = 'var(--fg)';
                        element.style.textShadow = `0 0 8px var(--glow-cyan)`;
                        setTimeout(() => {
                            element.style.textShadow = '';
                        }, 400);
                    }
                };
                requestAnimationFrame(updateCounter);
            };
            
            const getVisitCount = () => {
                try {
                    const stored = localStorage.getItem(COUNTER_KEY);
                    if (stored === null) {
                        return 1;
                    }
                    const parsed = parseInt(stored, 10);
                    return isNaN(parsed) ? 1 : parsed;
                } catch (e) {
                    return 1;
                }
            };
            
            const incrementVisit = () => {
                try {
                    let current = getVisitCount();
                    const isNewSession = !sessionStorage.getItem('gifted_session_counted');
                    
                    if (isNewSession) {
                        current += 1;
                        localStorage.setItem(COUNTER_KEY, current.toString());
                        sessionStorage.setItem('gifted_session_counted', 'true');
                        return current;
                    } else {
                        return current;
                    }
                } catch (e) {
                    return 1;
                }
            };
            
            const initCounter = () => {
                const newCount = incrementVisit();
                const oldCount = getVisitCount() - (sessionStorage.getItem('gifted_session_counted') === 'true' ? 1 : 0);
                const displayOld = oldCount > 0 ? oldCount : 1;
                
                if (counterDisplay) {
                    counterDisplay.textContent = formatCount(displayOld);
                    setTimeout(() => {
                        animateCounterWithGlitch(counterDisplay, displayOld, newCount, 650);
                    }, 100);
                }
            };
            
            initCounter();
            
            const counterItem = document.querySelector('.counter-item');
            if (counterItem && !isTouch) {
                counterItem.addEventListener('mouseenter', () => {
                    if (counterDisplay) {
                        const currentVal = parseInt(counterDisplay.textContent, 10);
                        counterDisplay.style.animation = 'digitGlitch 0.1s infinite';
                        setTimeout(() => {
                            if (counterDisplay) counterDisplay.style.animation = '';
                        }, 300);
                    }
                });
            }
            
            if (counterItem && isTouch) {
                counterItem.addEventListener('touchstart', () => {
                    if (counterDisplay) {
                        counterDisplay.style.transform = 'scale(1.05)';
                        counterDisplay.style.animation = 'digitGlitch 0.08s 2';
                        setTimeout(() => {
                            if (counterDisplay) counterDisplay.style.transform = '';
                        }, 200);
                    }
                });
            }
        })();
    </script>
</body>
</html>
